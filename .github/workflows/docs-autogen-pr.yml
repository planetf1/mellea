name: Generate API Documentation

# TODO: Re-enable once branch strategy is agreed (main vs dedicated docs branch)
# and integration with the new uv-based tooling is validated end-to-end. See PR #611.
on:
  workflow_dispatch:
    inputs:
      enabled:
        description: 'This workflow is currently disabled pending branch strategy decision'
        required: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-autogen-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # Use native setup-uv with caching
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      
      # Check lock file is up to date (determinism check)
      - name: Check lock file is up to date
        run: |
          uv lock --check
          if ! git diff --exit-code uv.lock; then
            echo "ERROR: uv.lock is out of sync. Run 'uv lock' locally."
            exit 1
          fi
      
      # Extract version from tag
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      # Build wheel from local source
      - name: Build wheel
        run: uv build --wheel
      
      # Generate API documentation using build.py wrapper
      - name: Generate API documentation
        run: |
          WHEEL=$(ls dist/*.whl | head -n1)
          uv run --isolated --with "${WHEEL}" --with mdxify --with griffe \
            python tooling/docs-autogen/build.py \
            --version ${{ steps.version.outputs.VERSION }} \
            --no-venv
      
      # Validate documentation with quality thresholds
      - name: Validate documentation
        run: |
          uv run --isolated --with griffe \
            python tooling/docs-autogen/audit_coverage.py \
            --docs-dir docs/docs/api \
            --threshold 80.0
      
      # Create Pull Request with generated docs
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update API documentation for ${{ steps.version.outputs.VERSION }}"
          title: "docs: API documentation for v${{ steps.version.outputs.VERSION }}"
          body: |
            Auto-generated API documentation for version ${{ steps.version.outputs.VERSION }}
            
            Generated from tag: ${{ github.ref }}
            
            ## Changes
            - Updated API documentation from local wheel build
            - Validated coverage meets 80% threshold
          branch: docs/api-${{ steps.version.outputs.VERSION }}
          base: main
          delete-branch: true
          labels: |
            documentation
            automation

